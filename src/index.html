<!DOCTYPE html>
<html>
<head>
    <title>Admin Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow">

    <h1 class="text-2xl font-bold mb-6">
        Edit Banner
    </h1>

    <div class="space-y-4">

        <label>Banner</label>
<input type="file"
       id="image_benner"
       class="w-full border rounded-xl p-3"
       accept="image/*">

<label>Logo</label>
<input type="file"
       id="image_logo"
       class="w-full border rounded-xl p-3"
       accept="image/*">

        <textarea id="desc"
                  class="w-full border rounded-xl p-3"
                  placeholder="Deskripsi"></textarea>

        <input id="link"
               class="w-full border rounded-xl p-3"
               placeholder="Link">

        <button onclick="saveBanner()"
                class="w-full bg-blue-600 text-white p-3 rounded-xl">
            Simpan
        </button>

    </div>

</div>
<script>
    let bannerUrl = "";
    let logoUrl = "";
</script>
<script>

async function loadBanner() {
    const res = await fetch("/benner");
    const data = await res.json();
    
    bannerUrl = data.image_benner;
    logoUrl = data.image_logo;
    
    desc.value = data.desc;
    link.value = data.link;
}

async function uploadFile(file) {
    const formData = new FormData();
    formData.append("file", file);
    
    const res = await fetch("/admin/upload", {
        method: "POST",
        body: formData
    });
    
    const data = await res.json();
    
    return data.url;
}

async function saveBanner() {
    
    if (image_benner.files.length > 0) {
        bannerUrl = await uploadFile(image_benner.files[0]);
    }
    
    if (image_logo.files.length > 0) {
        logoUrl = await uploadFile(image_logo.files[0]);
    }
    
    const payload = {
        image_benner: bannerUrl,
        image_logo: logoUrl,
        desc: desc.value,
        link: link.value
    };
    
    const res = await fetch("/admin/benner", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });
    
    const data = await res.json();
    
    if (data.success) {
        alert("Banner berhasil disimpan");
    }
}

loadBanner();

</script>

</body>
</html>
