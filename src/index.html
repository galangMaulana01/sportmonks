<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kelola Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- tambahan sedikit custom untuk sentuhan manual -->
    <style>
        /* biar preview gambar lebih rapi & ada transisi halus */
        .preview-img {
            transition: opacity 0.2s ease;
            object-fit: cover;
            background-color: #f9fafb;
        }
        .preview-logo {
            object-fit: contain;
            background-color: #f9fafb;
        }
        /* styling custom untuk input file biar lebih minimalis (opsional) */
        input[type="file"] {
            font-size: 0.875rem;
            color: #374151;
        }
        input[type="file"]::file-selector-button {
            border-radius: 0.5rem;
            border: none;
            background-color: #f3f4f6;
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #1f2937;
            cursor: pointer;
            transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: #e5e7eb;
        }
        /* fokus ring yang natural */
        input:focus, textarea:focus {
            outline: none;
            ring: 2px solid #9ca3af;
            border-color: #9ca3af;
        }
        /* disable state tombol */
        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-neutral-50 font-sans antialiased">

    <div class="max-w-2xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <!-- card utama dengan kesan simpel & rapi -->
        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
            
            <!-- header tipis -->
            <div class="px-6 pt-6 pb-2 border-b border-gray-100">
                <h1 class="text-lg font-medium text-gray-800 tracking-tight">Pengaturan Banner</h1>
                <p class="text-xs text-gray-400 mt-0.5">Ubah gambar & konten utama halaman</p>
            </div>

            <!-- form -->
            <div class="p-6 space-y-6">

                <!-- Banner gambar utama -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Banner utama</label>
                    <div class="mt-1">
                        <input type="file" id="image_benner" accept="image/*"
                               class="w-full border border-gray-200 rounded-lg p-2 text-sm bg-gray-50 focus:bg-white focus:border-gray-300 transition">
                    </div>
                    <div class="relative mt-2">
                        <img id="banner_preview" class="preview-img hidden w-full max-h-48 rounded-lg border border-gray-200 shadow-sm object-cover">
                    </div>
                    <p class="text-xs text-gray-400">Rekomendasi rasio 16:9, ukuran maksimal 2MB</p>
                </div>

                <!-- Logo -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Logo</label>
                    <div class="mt-1">
                        <input type="file" id="image_logo" accept="image/*"
                               class="w-full border border-gray-200 rounded-lg p-2 text-sm bg-gray-50 focus:bg-white focus:border-gray-300 transition">
                    </div>
                    <div class="mt-2">
                        <img id="logo_preview" class="preview-logo hidden w-28 h-28 rounded-lg border border-gray-200 shadow-sm object-contain bg-gray-50 p-1">
                    </div>
                    <p class="text-xs text-gray-400">Ukuran persegi lebih baik, transparan direkomendasikan</p>
                </div>

                <!-- Deskripsi -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Deskripsi singkat</label>
                    <textarea id="desc" rows="3"
                              class="w-full border border-gray-200 rounded-lg p-3 text-sm bg-gray-50 focus:bg-white focus:border-gray-300 transition resize-none"
                              placeholder="Tulis deskripsi banner disini..."></textarea>
                </div>

                <!-- Link -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">URL Tujuan</label>
                    <input id="link" type="url"
                           class="w-full border border-gray-200 rounded-lg p-2.5 text-sm bg-gray-50 focus:bg-white focus:border-gray-300 transition"
                           placeholder="https://example.com/halaman">
                </div>

                <!-- Tombol simpan -->
                <div class="pt-4">
                    <button id="saveBtn" onclick="saveBanner()"
                            class="btn-save w-full bg-gray-900 hover:bg-gray-800 text-white text-sm font-medium py-2.5 rounded-lg transition duration-150 shadow-sm">
                        Simpan Perubahan
                    </button>
                </div>
            </div>
        </div>
        <!-- pesan kecil footer -->
        <div class="text-center mt-5 text-xs text-gray-400">
            Perubahan akan langsung tampil di halaman publik
        </div>
    </div>

<script>
    // --- elemen DOM ---
    const imageBenner = document.getElementById('image_benner');
    const imageLogo = document.getElementById('image_logo');
    const bannerPreview = document.getElementById('banner_preview');
    const logoPreview = document.getElementById('logo_preview');
    const descText = document.getElementById('desc');
    const linkInput = document.getElementById('link');
    const saveBtn = document.getElementById('saveBtn');

    let currentBannerUrl = "";
    let currentLogoUrl = "";

    // --- load data existing ---
    async function loadBanner() {
        try {
            const res = await fetch("/benner");
            const data = await res.json();

            currentBannerUrl = data.image_benner || "";
            currentLogoUrl = data.image_logo || "";

            descText.value = data.desc || "";
            linkInput.value = data.link || "";

            if (currentBannerUrl) {
                bannerPreview.src = currentBannerUrl;
                bannerPreview.classList.remove("hidden");
            } else {
                bannerPreview.classList.add("hidden");
            }

            if (currentLogoUrl) {
                logoPreview.src = currentLogoUrl;
                logoPreview.classList.remove("hidden");
            } else {
                logoPreview.classList.add("hidden");
            }

        } catch (err) {
            console.error(err);
            alert("Gagal memuat data banner");
        }
    }

    // preview banner saat pilih file
    imageBenner.onchange = () => {
        if (imageBenner.files.length > 0) {
            const file = imageBenner.files[0];
            const objectUrl = URL.createObjectURL(file);
            bannerPreview.src = objectUrl;
            bannerPreview.classList.remove("hidden");
            // release objectURL setelah load (optional)
            bannerPreview.onload = () => URL.revokeObjectURL(objectUrl);
        } else {
            // jika tidak ada file, tampilkan existing atau kosong
            if (!currentBannerUrl) bannerPreview.classList.add("hidden");
        }
    };

    // preview logo
    imageLogo.onchange = () => {
        if (imageLogo.files.length > 0) {
            const file = imageLogo.files[0];
            const objectUrl = URL.createObjectURL(file);
            logoPreview.src = objectUrl;
            logoPreview.classList.remove("hidden");
            logoPreview.onload = () => URL.revokeObjectURL(objectUrl);
        } else {
            if (!currentLogoUrl) logoPreview.classList.add("hidden");
        }
    };

    // upload file ke cloudinary via endpoint
    async function uploadFile(file) {
        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch("/admin/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        if (!data.success) throw new Error("Upload gagal");
        return data.url;
    }

    // simpan semua data
    async function saveBanner() {
        // nonaktifkan tombol
        saveBtn.disabled = true;
        const originalText = saveBtn.innerText;
        saveBtn.innerText = "Menyimpan...";

        try {
            // upload banner jika ada file baru
            if (imageBenner.files.length > 0) {
                currentBannerUrl = await uploadFile(imageBenner.files[0]);
            }

            // upload logo jika ada file baru
            if (imageLogo.files.length > 0) {
                currentLogoUrl = await uploadFile(imageLogo.files[0]);
            }

            const payload = {
                image_benner: currentBannerUrl,
                image_logo: currentLogoUrl,
                desc: descText.value,
                link: linkInput.value
            };

            const res = await fetch("/admin/benner", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (data.success) {
                alert("Banner berhasil disimpan");
                // reset input file agar tidak upload ganda nanti
                imageBenner.value = '';
                imageLogo.value = '';
                // reload ulang data dari server biar konsisten (opsional)
                await loadBanner();
            } else {
                alert("Gagal menyimpan banner");
            }

        } catch (err) {
            console.error(err);
            alert("Terjadi kesalahan saat menyimpan");
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = originalText;
        }
    }

    // jalankan
    loadBanner();
</script>

</body>
</html>
