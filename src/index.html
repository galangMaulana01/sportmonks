<!DOCTYPE html>
<html>
<head>
    <title>Admin Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-5">

    <div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow">

        <h1 class="text-2xl font-bold mb-6">
            Edit Banner
        </h1>

        <div class="space-y-5">

            <div>
                <label class="block font-medium mb-2">
                    Banner
                </label>

                <input
                    type="file"
                    id="image_benner"
                    accept="image/*"
                    class="w-full border rounded-xl p-3">

                <img
                    id="banner_preview"
                    class="hidden mt-3 w-full rounded-xl border">
            </div>

            <div>
                <label class="block font-medium mb-2">
                    Logo
                </label>

                <input
                    type="file"
                    id="image_logo"
                    accept="image/*"
                    class="w-full border rounded-xl p-3">

                <img
                    id="logo_preview"
                    class="hidden mt-3 w-32 rounded-xl border">
            </div>

            <div>
                <label class="block font-medium mb-2">
                    Deskripsi
                </label>

                <textarea
                    id="desc"
                    rows="3"
                    class="w-full border rounded-xl p-3"
                    placeholder="Masukkan deskripsi"></textarea>
            </div>

            <div>
                <label class="block font-medium mb-2">
                    Link
                </label>

                <input
                    id="link"
                    class="w-full border rounded-xl p-3"
                    placeholder="https://...">
            </div>

            <button
                id="saveBtn"
                onclick="saveBanner()"
                class="w-full bg-blue-600 text-white p-3 rounded-xl font-semibold">
                Simpan
            </button>

        </div>

    </div>

<script>

let bannerUrl = "";
let logoUrl = "";

async function loadBanner() {
    try {

        const res = await fetch("/benner");
        const data = await res.json();

        bannerUrl = data.image_benner || "";
        logoUrl = data.image_logo || "";

        desc.value = data.desc || "";
        link.value = data.link || "";

        if (bannerUrl) {
            banner_preview.src = bannerUrl;
            banner_preview.classList.remove("hidden");
        }

        if (logoUrl) {
            logo_preview.src = logoUrl;
            logo_preview.classList.remove("hidden");
        }

    } catch (err) {
        console.error(err);
        alert("Gagal memuat banner");
    }
}

image_benner.onchange = () => {

    if (image_benner.files.length > 0) {
        banner_preview.src = URL.createObjectURL(
            image_benner.files[0]
        );

        banner_preview.classList.remove("hidden");
    }
};

image_logo.onchange = () => {

    if (image_logo.files.length > 0) {
        logo_preview.src = URL.createObjectURL(
            image_logo.files[0]
        );

        logo_preview.classList.remove("hidden");
    }
};

async function uploadFile(file) {

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/admin/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (!data.success) {
        throw new Error("Upload gagal");
    }

    return data.url;
}

async function saveBanner() {

    saveBtn.disabled = true;
    saveBtn.innerText = "Menyimpan...";

    try {

        if (image_benner.files.length > 0) {
            bannerUrl = await uploadFile(
                image_benner.files[0]
            );
        }

        if (image_logo.files.length > 0) {
            logoUrl = await uploadFile(
                image_logo.files[0]
            );
        }

        const payload = {
            image_benner: bannerUrl,
            image_logo: logoUrl,
            desc: desc.value,
            link: link.value
        };

        const res = await fetch("/admin/benner", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.success) {
            alert("Banner berhasil disimpan");
        } else {
            alert("Gagal menyimpan banner");
        }

    } catch (err) {

        console.error(err);
        alert("Terjadi kesalahan");

    } finally {

        saveBtn.disabled = false;
        saveBtn.innerText = "Simpan";

    }
}

loadBanner();

</script>

</body>
</html>
