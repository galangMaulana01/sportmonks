<!DOCTYPE html>
<html>
<head>
    <title>Admin Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow">

    <h1 class="text-2xl font-bold mb-6">
        Edit Banner
    </h1>

    <div class="space-y-4">

        <input id="image_benner"
               class="w-full border rounded-xl p-3"
               placeholder="Image Banner">

        <input id="image_logo"
               class="w-full border rounded-xl p-3"
               placeholder="Image Logo">

        <textarea id="desc"
                  class="w-full border rounded-xl p-3"
                  placeholder="Deskripsi"></textarea>

        <input id="link"
               class="w-full border rounded-xl p-3"
               placeholder="Link">

        <button onclick="saveBanner()"
                class="w-full bg-blue-600 text-white p-3 rounded-xl">
            Simpan
        </button>

    </div>

</div>

<script>

async function loadBanner() {
    const res = await fetch("/benner");
    const data = await res.json();

    image_benner.value = data.image_benner;
    image_logo.value = data.image_logo;
    desc.value = data.desc;
    link.value = data.link;
}

async function saveBanner() {

    const payload = {
        image_benner: image_benner.value,
        image_logo: image_logo.value,
        desc: desc.value,
        link: link.value
    };

    const res = await fetch("/admin/benner", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.success) {
        alert("Banner berhasil disimpan");
    }
}

loadBanner();

</script>

</body>
</html>
